AWSTemplateFormatVersion: '2010-09-09'
Description: ECS cluster, Fargate task definition, service (CODE_DEPLOY controller), and auto scaling

Parameters:
  ProjectName:
    Type: String
  InitialImageUri:
    Type: String
    Description: >
      ECR image URI for the initial task definition. After first deployment
      CodeDeploy owns all subsequent updates — do not change this parameter
      after initial stack creation.
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
  ECSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  TargetGroupBlueArn:
    Type: String
  HTTPListenerArn:
    Type: String

Resources:

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}
      RetentionInDays: 7

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-task
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref InitialImageUri
          Essential: true
          # Override nginx to listen on 8080 and serve /health with 200 OK.
          # The default nginx image listens on port 80, which fails the ALB
          # health check (port 8080 /health). This Command reconfigures it
          # so CloudFormation can detect a stable service.
          # CodeDeploy replaces this task definition on first pipeline run;
          # this Command is never applied to the real Java app container.
          Command:
            - /bin/sh
            - -c
            - >-
              printf 'server{listen 8080;location /health{return 200 ok;}}'
              > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HTTPListenerArnParam
    Properties:
      ServiceName: !Sub ${ProjectName}-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      # Grace period lets CloudFormation consider the service stable while the
      # placeholder nginx image is running (nginx listens on port 80 but health
      # checks target port 8080 /health). Once CodeDeploy deploys the real Java
      # app (which serves /health on 8080) health checks pass naturally and this
      # grace period becomes irrelevant.
      HealthCheckGracePeriodSeconds: 3600
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroupBlueArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Dummy resource to create an explicit dependency on the listener
  # so the service isn't registered before the ALB listener exists.
  HTTPListenerArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/listener-arn
      Type: String
      Value: !Ref HTTPListenerArn

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: ECSService
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Sub service/${ProjectName}-cluster/${ProjectName}-service
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  CPUScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${ProjectName}-cpu-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
  ServiceName:
    Value: !GetAtt ECSService.Name
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
