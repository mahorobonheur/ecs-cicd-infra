AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bootstrap stack — deploy this ONCE directly from the AWS Console
  (CloudFormation > Create stack > With new resources > Upload a template file).
  No S3 bucket required since this file is small enough to upload directly.

  Creates:
    - S3 bucket to host all child CloudFormation templates
    - IAM role for the INFRA repo GitHub Actions (uploads templates to S3)

  NOTE: The GitHub OIDC provider is NOT created here because one already
  exists in this account. Its ARN is deterministic and referenced directly.

  After deploying, copy the Outputs and set them as GitHub Actions
  variables in your infra repository settings.

Parameters:
  ProjectName:
    Type: String
  InfraRepoOwner:
    Type: String
    Description: GitHub username or org that owns the infra repository
  InfraRepoName:
    Type: String
    Description: Name of the infra repository (e.g. ecs-cicd-infra)

Resources:

  TemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-cfn-templates-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # The GitHub OIDC provider already exists in this account.
  # Its ARN is always arn:aws:iam::ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com
  # so we reference it via !Sub without creating it as a resource.
  InfraGitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-infra-github-actions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${InfraRepoOwner}/${InfraRepoName}:*
      Policies:
        - PolicyName: UploadTemplatesToS3
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TemplatesBucket.Arn
                  - !Sub ${TemplatesBucket.Arn}/*
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  TemplatesBucketName:
    Description: Set this as TEMPLATES_BUCKET in the infra repo GitHub Actions variables
    Value: !Ref TemplatesBucket

  TemplatesBucketUrl:
    Description: Set this as TemplatesBucketUrl in deployment-file.yaml
    Value: !Sub https://${TemplatesBucket}.s3.${AWS::Region}.amazonaws.com/templates

  InfraGitHubActionsRoleArn:
    Description: Set this as AWS_ROLE_ARN in the infra repo GitHub Actions variables
    Value: !GetAtt InfraGitHubActionsRole.Arn
