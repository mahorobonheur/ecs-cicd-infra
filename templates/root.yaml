AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — root (parent) stack.
  Orchestrates all nested child stacks and wires their outputs together as
  parameters. This is the only template CloudFormation GitSync needs to watch.
  Child templates must be uploaded to S3 before deploying this stack
  (use scripts/upload-templates.sh).

Parameters:
  ProjectName:
    Type: String
    Description: Short prefix used for all resource names (e.g. ecs-cicd)

  TemplatesBucketUrl:
    Type: String
    Description: >
      S3 URL prefix where child templates are stored, without trailing slash.
      Example: https://my-bucket.s3.us-east-1.amazonaws.com/templates

  InitialImageUri:
    Type: String
    Description: >
      Full ECR image URI for the very first ECS task definition.
      After initial deploy, CodeDeploy owns all subsequent updates.

  GitHubConnectionArn:
    Type: String
    Description: >
      ARN of the CodeConnections connection to GitHub (create in
      CodePipeline > Settings > Connections and approve it first).

  InfraRepoOwner:
    Type: String
    Description: GitHub username or org that owns the infra repository

  InfraRepoName:
    Type: String
    Description: Name of the infra GitHub repository (e.g. ecs-cicd-infra)

  InfraRepoBranch:
    Type: String
    Description: Branch to track for appspec.yaml / taskdef.json

  GitHubOwner:
    Type: String
    Description: GitHub username or org that owns the application repository

  AppRepoName:
    Type: String
    Description: Name of the application GitHub repository (e.g. ecs-cicd-app)

Resources:

  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/00-vpc.yaml
      Parameters:
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/01-ecr.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        VPCId: !GetAtt VPCStack.Outputs.VPCId
        PrivateSubnet1: !GetAtt VPCStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt VPCStack.Outputs.PrivateSubnet2
        PrivateRouteTable: !GetAtt VPCStack.Outputs.PrivateRouteTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ALBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/02-alb.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        VPCId: !GetAtt VPCStack.Outputs.VPCId
        PublicSubnet1: !GetAtt VPCStack.Outputs.PublicSubnet1
        PublicSubnet2: !GetAtt VPCStack.Outputs.PublicSubnet2
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/03-ecs-service.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        InitialImageUri: !Ref InitialImageUri
        PrivateSubnet1: !GetAtt VPCStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt VPCStack.Outputs.PrivateSubnet2
        ECSSecurityGroupId: !GetAtt ALBStack.Outputs.ECSSecurityGroupId
        TargetGroupBlueArn: !GetAtt ALBStack.Outputs.TargetGroupBlueArn
        HTTPListenerArn: !GetAtt ALBStack.Outputs.HTTPListenerArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  PipelineStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/04-pipeline.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        GitHubConnectionArn: !Ref GitHubConnectionArn
        InfraRepoOwner: !Ref InfraRepoOwner
        InfraRepoName: !Ref InfraRepoName
        InfraRepoBranch: !Ref InfraRepoBranch
        ECRRepositoryName: !GetAtt ECRStack.Outputs.ECRRepositoryName
        ECRRepositoryArn: !GetAtt ECRStack.Outputs.ECRRepositoryArn
        ClusterName: !GetAtt ECSStack.Outputs.ClusterName
        ServiceName: !GetAtt ECSStack.Outputs.ServiceName
        TargetGroupBlueName: !GetAtt ALBStack.Outputs.TargetGroupBlueName
        TargetGroupGreenName: !GetAtt ALBStack.Outputs.TargetGroupGreenName
        HTTPListenerArn: !GetAtt ALBStack.Outputs.HTTPListenerArn
        TaskExecutionRoleArn: !GetAtt ECSStack.Outputs.TaskExecutionRoleArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  OIDCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/05-oidc.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        GitHubOwner: !Ref GitHubOwner
        AppRepoName: !Ref AppRepoName
        ECRRepositoryArn: !GetAtt ECRStack.Outputs.ECRRepositoryArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  ALBEndpoint:
    Description: Public URL of the application
    Value: !Sub http://${ALBStack.Outputs.ALBDNSName}

  ECRRepositoryUri:
    Description: ECR URI — set this as ECR_REPOSITORY in GitHub Actions variables
    Value: !GetAtt ECRStack.Outputs.ECRRepositoryUri

  GitHubActionsRoleArn:
    Description: IAM role ARN — set this as AWS_ROLE_ARN in GitHub Actions variables
    Value: !GetAtt OIDCStack.Outputs.GitHubActionsRoleArn

  ECSClusterName:
    Value: !GetAtt ECSStack.Outputs.ClusterName

  ECSServiceName:
    Value: !GetAtt ECSStack.Outputs.ServiceName

  PipelineName:
    Value: !GetAtt PipelineStack.Outputs.PipelineName
