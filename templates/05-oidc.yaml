AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM role for the APP repo GitHub Actions to push images to ECR.
  The GitHub OIDC provider is NOT created here — it is created once in
  bootstrap/bootstrap.yaml and referenced by its deterministic ARN.

Parameters:
  ProjectName:
    Type: String
  GitHubOwner:
    Type: String
  AppRepoName:
    Type: String
  ECRRepositoryArn:
    Type: String

Resources:

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-app-github-actions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              # OIDC provider ARN is deterministic — no need to Ref a resource
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${AppRepoName}:*
      Policies:
        - PolicyName: ECRPushPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !Ref ECRRepositoryArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
