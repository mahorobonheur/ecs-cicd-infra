AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS CI/CD Lab — platform root stack (ecs-cicd-infra).
  Orchestrates ECR, ALB, ECS cluster, and OIDC roles.
  VPC values are consumed from SSM (published by ecs-cicd-network).
  Pipeline resources live in the separate ecs-cicd-pipeline repo.
  Key platform outputs are published to SSM for the pipeline layer to consume.

Parameters:
  ProjectName:
    Type: String
    Description: Short prefix used for all resource names (e.g. ecs-cicd)

  TemplatesBucketUrl:
    Type: String
    Description: >
      S3 URL prefix where child templates are stored, without trailing slash.
      Example: https://my-bucket.s3.us-east-1.amazonaws.com/templates

  InitialImageUri:
    Type: String
    Description: >
      Full ECR image URI for the very first ECS task definition.
      After initial deploy, CodeDeploy owns all subsequent updates.

  GitHubOwner:
    Type: String
    Description: GitHub username or org that owns the application repository

  AppRepoName:
    Type: String
    Description: Name of the application GitHub repository (e.g. ecs-cicd-app)

  # ── VPC values resolved from SSM (published by ecs-cicd-network) ───────────
  VPCId:
    Type: String
    Description: VPC ID — resolved from SSM /ecs-cicd/vpc-id

  PublicSubnet1:
    Type: String
    Description: Public subnet 1 ID — resolved from SSM /ecs-cicd/public-subnet-1

  PublicSubnet2:
    Type: String
    Description: Public subnet 2 ID — resolved from SSM /ecs-cicd/public-subnet-2

  PrivateSubnet1:
    Type: String
    Description: Private subnet 1 ID — resolved from SSM /ecs-cicd/private-subnet-1

  PrivateSubnet2:
    Type: String
    Description: Private subnet 2 ID — resolved from SSM /ecs-cicd/private-subnet-2

  PrivateRouteTable:
    Type: String
    Description: Private route table ID — resolved from SSM /ecs-cicd/private-route-table

Resources:

  ECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/01-ecr.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        VPCId: !Ref VPCId
        PrivateSubnet1: !Ref PrivateSubnet1
        PrivateSubnet2: !Ref PrivateSubnet2
        PrivateRouteTable: !Ref PrivateRouteTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ALBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/02-alb.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        VPCId: !Ref VPCId
        PublicSubnet1: !Ref PublicSubnet1
        PublicSubnet2: !Ref PublicSubnet2
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ECSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/03-ecs-service.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        InitialImageUri: !Ref InitialImageUri
        PrivateSubnet1: !Ref PrivateSubnet1
        PrivateSubnet2: !Ref PrivateSubnet2
        PublicSubnet1: !Ref PublicSubnet1          # NEW
        PublicSubnet2: !Ref PublicSubnet2          # NEW
        ECSSecurityGroupId: !GetAtt ALBStack.Outputs.ECSSecurityGroupId
        TargetGroupBlueArn: !GetAtt ALBStack.Outputs.TargetGroupBlueArn
        HTTPListenerArn: !GetAtt ALBStack.Outputs.HTTPListenerArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  OIDCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/04-oidc.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        GitHubOwner: !Ref GitHubOwner
        AppRepoName: !Ref AppRepoName
        ECRRepositoryArn: !GetAtt ECRStack.Outputs.ECRRepositoryArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── SSM exports for ecs-cicd-pipeline ──────────────────────────────────────
  ClusterNameParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/cluster-name
      Type: String
      Value: !GetAtt ECSStack.Outputs.ClusterName
      Tags:
        Project: !Ref ProjectName

  ServiceNameParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/service-name
      Type: String
      Value: !GetAtt ECSStack.Outputs.ServiceName
      Tags:
        Project: !Ref ProjectName

  TaskExecutionRoleArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/task-execution-role-arn
      Type: String
      Value: !GetAtt ECSStack.Outputs.TaskExecutionRoleArn
      Tags:
        Project: !Ref ProjectName

  ECRRepositoryNameParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/ecr-repo-name
      Type: String
      Value: !GetAtt ECRStack.Outputs.ECRRepositoryName
      Tags:
        Project: !Ref ProjectName

  ECRRepositoryArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/ecr-repo-arn
      Type: String
      Value: !GetAtt ECRStack.Outputs.ECRRepositoryArn
      Tags:
        Project: !Ref ProjectName

  ECRRepositoryUriParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/ecr-repo-uri
      Type: String
      Value: !GetAtt ECRStack.Outputs.ECRRepositoryUri
      Tags:
        Project: !Ref ProjectName

  HTTPListenerArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/alb-listener-arn
      Type: String
      Value: !GetAtt ALBStack.Outputs.HTTPListenerArn
      Tags:
        Project: !Ref ProjectName

  TargetGroupBlueNameParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/tg-blue-name
      Type: String
      Value: !GetAtt ALBStack.Outputs.TargetGroupBlueName
      Tags:
        Project: !Ref ProjectName

  TargetGroupGreenNameParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /ecs-cicd/tg-green-name
      Type: String
      Value: !GetAtt ALBStack.Outputs.TargetGroupGreenName
      Tags:
        Project: !Ref ProjectName

Outputs:
  ALBEndpoint:
    Description: Public URL of the application
    Value: !Sub http://${ALBStack.Outputs.ALBDNSName}

  ECRRepositoryUri:
    Description: ECR URI — set this as ECR_REPOSITORY in GitHub Actions variables
    Value: !GetAtt ECRStack.Outputs.ECRRepositoryUri

  GitHubActionsRoleArn:
    Description: IAM role ARN — set this as AWS_ROLE_ARN in GitHub Actions variables
    Value: !GetAtt OIDCStack.Outputs.GitHubActionsRoleArn

  ECSClusterName:
    Value: !GetAtt ECSStack.Outputs.ClusterName

  ECSServiceName:
    Value: !GetAtt ECSStack.Outputs.ServiceName