<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="11">
  <title>ECS CI/CD Architecture Diagram</title>
  <desc>AWS architecture showing multi-AZ VPC with private ECS Fargate tasks, public ALB, VPC endpoints, ECR, and a GitHub Actions / CodePipeline / CodeDeploy CI/CD pipeline.</desc>

  <!-- Background -->
  <rect width="960" height="700" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">ECS CI/CD Architecture — Lab 1</text>
  <text x="480" y="44" text-anchor="middle" font-size="10" fill="#6c757d">Bonheur Mahoro · Amazon ECS Fargate · Blue/Green Deployment · CloudFormation GitSync</text>

  <!-- CI/CD PIPELINE LANE -->
  <rect x="12" y="56" width="936" height="130" rx="8" fill="none" stroke="#6c757d" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="24" y="72" font-size="10" font-weight="600" fill="#6c757d">CI/CD PIPELINE</text>

  <!-- GitHub App Repo -->
  <rect x="28" y="80" width="100" height="52" rx="6" fill="#24292e"/>
  <text x="78" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GitHub</text>
  <text x="78" y="113" text-anchor="middle" font-size="9" fill="#adb5bd">ecs-cicd-app</text>
  <text x="78" y="124" text-anchor="middle" font-size="8" fill="#6c757d">push to main</text>

  <line x1="128" y1="106" x2="155" y2="106" stroke="#495057" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub Actions -->
  <rect x="155" y="80" width="108" height="52" rx="6" fill="#2088ff"/>
  <text x="209" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GitHub Actions</text>
  <text x="209" y="113" text-anchor="middle" font-size="9" fill="#cfe2ff">build-push.yml</text>
  <text x="209" y="124" text-anchor="middle" font-size="8" fill="#cfe2ff">OIDC · Docker build</text>

  <line x1="263" y1="106" x2="290" y2="106" stroke="#495057" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ECR -->
  <rect x="290" y="80" width="90" height="52" rx="6" fill="#e05c27"/>
  <text x="335" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Amazon ECR</text>
  <text x="335" y="113" text-anchor="middle" font-size="9" fill="#ffe0d6">Immutable tags</text>
  <text x="335" y="124" text-anchor="middle" font-size="8" fill="#ffe0d6">SHA + latest</text>

  <line x1="380" y1="106" x2="407" y2="106" stroke="#495057" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EventBridge -->
  <rect x="407" y="80" width="100" height="52" rx="6" fill="#e7157b"/>
  <text x="457" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">EventBridge</text>
  <text x="457" y="113" text-anchor="middle" font-size="9" fill="#fce4f0">ECR push rule</text>
  <text x="457" y="124" text-anchor="middle" font-size="8" fill="#fce4f0">triggers pipeline</text>

  <line x1="507" y1="106" x2="534" y2="106" stroke="#495057" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CodePipeline -->
  <rect x="534" y="80" width="100" height="52" rx="6" fill="#1a73e8"/>
  <text x="584" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CodePipeline</text>
  <text x="584" y="113" text-anchor="middle" font-size="9" fill="#d0e4fd">Source → Build</text>
  <text x="584" y="124" text-anchor="middle" font-size="8" fill="#d0e4fd">→ Deploy</text>

  <line x1="634" y1="106" x2="661" y2="106" stroke="#495057" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CodeBuild -->
  <rect x="661" y="80" width="90" height="52" rx="6" fill="#1a73e8" fill-opacity="0.75"/>
  <text x="706" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CodeBuild</text>
  <text x="706" y="113" text-anchor="middle" font-size="9" fill="#d0e4fd">taskdef.json</text>
  <text x="706" y="124" text-anchor="middle" font-size="8" fill="#d0e4fd">generate</text>

  <line x1="751" y1="106" x2="778" y2="106" stroke="#495057" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CodeDeploy -->
  <rect x="778" y="80" width="100" height="52" rx="6" fill="#0d6e3f"/>
  <text x="828" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CodeDeploy</text>
  <text x="828" y="113" text-anchor="middle" font-size="9" fill="#d1fae5">Blue/Green</text>
  <text x="828" y="124" text-anchor="middle" font-size="8" fill="#d1fae5">ECS all-at-once</text>

  <!-- GitSync box -->
  <rect x="882" y="80" width="58" height="52" rx="6" fill="#6f42c1"/>
  <text x="911" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">CFN</text>
  <text x="911" y="112" text-anchor="middle" font-size="9" fill="#e9d8fd">GitSync</text>
  <text x="911" y="124" text-anchor="middle" font-size="8" fill="#e9d8fd">infra repo</text>

  <line x1="911" y1="132" x2="911" y2="196" stroke="#6f42c1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrPurple)"/>
  <line x1="828" y1="132" x2="828" y2="370" stroke="#0d6e3f" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>

  <!-- AWS REGION / VPC WRAPPER -->
  <rect x="12" y="196" width="936" height="490" rx="10" fill="none" stroke="#f90" stroke-width="2"/>
  <text x="28" y="215" font-size="11" font-weight="700" fill="#f90">AWS Region: eu-central-1</text>

  <!-- VPC box -->
  <rect x="24" y="222" width="912" height="454" rx="8" fill="none" stroke="#0070f3" stroke-width="1.5"/>
  <text x="40" y="240" font-size="10" font-weight="600" fill="#0070f3">VPC  10.0.0.0/16</text>

  <!-- AZ-A column -->
  <rect x="36" y="248" width="415" height="416" rx="6" fill="#e8f4fd" stroke="#93c5fd" stroke-width="1"/>
  <text x="238" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Availability Zone A  (eu-central-1a)</text>

  <!-- Public subnet A -->
  <rect x="48" y="272" width="175" height="80" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="135" y="288" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Public Subnet A</text>
  <text x="135" y="300" text-anchor="middle" font-size="8" fill="#166534">10.0.1.0/24</text>
  <rect x="64" y="306" width="70" height="36" rx="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="99" y="319" text-anchor="middle" font-size="8" font-weight="600" fill="#166534">NAT Gateway</text>
  <text x="99" y="331" text-anchor="middle" font-size="7" fill="#166534">+ EIP</text>
  <rect x="148" y="306" width="62" height="36" rx="4" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="179" y="319" text-anchor="middle" font-size="8" font-weight="600" fill="#166534">Internet</text>
  <text x="179" y="331" text-anchor="middle" font-size="7" fill="#166534">Gateway</text>

  <!-- Private subnet A -->
  <rect x="48" y="364" width="391" height="288" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="243" y="380" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Private Subnet A</text>
  <text x="243" y="392" text-anchor="middle" font-size="8" fill="#92400e">10.0.3.0/24</text>

  <!-- ECS Task A (Blue) -->
  <rect x="62" y="400" width="140" height="78" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="132" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">ECS Task (Blue)</text>
  <text x="132" y="430" text-anchor="middle" font-size="8" fill="#1e40af">Fargate · Private IP</text>
  <text x="132" y="442" text-anchor="middle" font-size="8" fill="#1e40af">Spring Boot :8080</text>
  <text x="132" y="454" text-anchor="middle" font-size="8" fill="#3b82f6">GET /health → 200</text>
  <text x="132" y="466" text-anchor="middle" font-size="7" fill="#6b7280">AssignPublicIp: DISABLED</text>

  <!-- ECS Task A (Green) -->
  <rect x="62" y="490" width="140" height="68" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="132" y="508" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">ECS Task (Green)</text>
  <text x="132" y="520" text-anchor="middle" font-size="8" fill="#166534">Fargate · Private IP</text>
  <text x="132" y="532" text-anchor="middle" font-size="8" fill="#166534">CodeDeploy target</text>
  <text x="132" y="544" text-anchor="middle" font-size="7" fill="#6b7280">Created on deployment</text>

  <!-- VPC Endpoints A -->
  <rect x="218" y="400" width="208" height="240" rx="5" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="322" y="416" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">VPC Endpoints</text>
  <rect x="228" y="422" width="188" height="28" rx="3" fill="#ede9fe"/>
  <text x="322" y="434" text-anchor="middle" font-size="8" fill="#5b21b6">ecr.api  (Interface)</text>
  <text x="322" y="445" text-anchor="middle" font-size="7" fill="#7c3aed">com.amazonaws.eu-central-1.ecr.api</text>
  <rect x="228" y="454" width="188" height="28" rx="3" fill="#ede9fe"/>
  <text x="322" y="466" text-anchor="middle" font-size="8" fill="#5b21b6">ecr.dkr  (Interface)</text>
  <text x="322" y="477" text-anchor="middle" font-size="7" fill="#7c3aed">com.amazonaws.eu-central-1.ecr.dkr</text>
  <rect x="228" y="486" width="188" height="28" rx="3" fill="#ede9fe"/>
  <text x="322" y="498" text-anchor="middle" font-size="8" fill="#5b21b6">s3  (Gateway)</text>
  <text x="322" y="509" text-anchor="middle" font-size="7" fill="#7c3aed">com.amazonaws.eu-central-1.s3</text>
  <rect x="228" y="518" width="188" height="28" rx="3" fill="#ede9fe"/>
  <text x="322" y="530" text-anchor="middle" font-size="8" fill="#5b21b6">logs  (Interface)</text>
  <text x="322" y="541" text-anchor="middle" font-size="7" fill="#7c3aed">com.amazonaws.eu-central-1.logs</text>
  <rect x="228" y="550" width="188" height="28" rx="3" fill="#ede9fe"/>
  <text x="322" y="562" text-anchor="middle" font-size="8" fill="#5b21b6">CloudWatch Logs</text>
  <text x="322" y="573" text-anchor="middle" font-size="7" fill="#7c3aed">/ecs/ecs-cicd  (7 day retention)</text>
  <line x1="202" y1="439" x2="226" y2="439" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrPurple)"/>

  <!-- AZ-B column -->
  <rect x="464" y="248" width="416" height="416" rx="6" fill="#e8f4fd" stroke="#93c5fd" stroke-width="1"/>
  <text x="672" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Availability Zone B  (eu-central-1b)</text>

  <!-- Public subnet B -->
  <rect x="476" y="272" width="390" height="80" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="671" y="288" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Public Subnet B  10.0.2.0/24</text>
  <rect x="488" y="298" width="366" height="44" rx="4" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="671" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#0d6e3f">Application Load Balancer</text>
  <text x="671" y="329" text-anchor="middle" font-size="8" fill="#166534">internet-facing · HTTP :80 → TG Blue/Green · /health checks</text>

  <!-- Private subnet B -->
  <rect x="476" y="364" width="391" height="160" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="671" y="380" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Private Subnet B</text>
  <text x="671" y="392" text-anchor="middle" font-size="8" fill="#92400e">10.0.4.0/24</text>

  <!-- ECS Service -->
  <rect x="490" y="400" width="363" height="112" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="671" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">ECS Service  (CODE_DEPLOY controller)</text>
  <text x="671" y="432" text-anchor="middle" font-size="8" fill="#1e40af">Cluster: ecs-cicd-cluster  ·  Fargate  ·  Private Subnets A+B</text>
  <text x="671" y="446" text-anchor="middle" font-size="8" fill="#1e40af">DesiredCount: 1  ·  Min: 1  ·  Max: 4</text>
  <text x="671" y="460" text-anchor="middle" font-size="8" fill="#3b82f6">CPU Target Tracking: 70%  ·  Scale-out: 60s  ·  Scale-in: 300s</text>
  <text x="671" y="474" text-anchor="middle" font-size="8" fill="#1e40af">Container: app :8080  ·  awslogs driver → /ecs/ecs-cicd</text>
  <text x="671" y="488" text-anchor="middle" font-size="8" fill="#1e40af">ExecutionRole: ecs-cicd-task-execution-role</text>
  <text x="671" y="500" text-anchor="middle" font-size="7" fill="#6b7280">Image: ECR URI (substituted by CodePipeline on each deploy)</text>

  <!-- Auto scaling label -->
  <rect x="490" y="524" width="363" height="28" rx="4" fill="#fef9c3" stroke="#fcd34d"/>
  <text x="671" y="536" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">Application Auto Scaling</text>
  <text x="671" y="548" text-anchor="middle" font-size="7" fill="#92400e">ScalableTarget  +  CPUScalingPolicy (TargetTrackingScaling)</text>

  <!-- Security Group legend -->
  <rect x="36" y="638" width="842" height="46" rx="5" fill="#f8f9fa" stroke="#dee2e6"/>
  <text x="52" y="654" font-size="9" font-weight="600" fill="#495057">Security Groups (least-privilege)</text>
  <rect x="52" y="660" width="10" height="10" rx="2" fill="#fca5a5"/>
  <text x="66" y="670" font-size="8" fill="#495057">ALB-SG: inbound :80 from 0.0.0.0/0</text>
  <rect x="230" y="660" width="10" height="10" rx="2" fill="#93c5fd"/>
  <text x="244" y="670" font-size="8" fill="#495057">ECS-SG: inbound :8080 from ALB-SG only</text>
  <rect x="450" y="660" width="10" height="10" rx="2" fill="#c4b5fd"/>
  <text x="464" y="670" font-size="8" fill="#495057">VPCEndpoint-SG: inbound :443 from VPC CIDR 10.0.0.0/16</text>
  <rect x="700" y="660" width="10" height="10" rx="2" fill="#6f42c1"/>
  <text x="714" y="670" font-size="8" fill="#495057">CloudFormation GitSync + nested stacks</text>

  <!-- Arrows: ALB to ECS -->
  <line x1="476" y1="342" x2="300" y2="398" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <line x1="476" y1="342" x2="600" y2="398" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- Internet to ALB -->
  <line x1="671" y1="248" x2="671" y2="297" stroke="#166534" stroke-width="1.5" marker-end="url(#arrGreen2)"/>
  <text x="685" y="278" font-size="8" fill="#166534">HTTP :80</text>

  <!-- NAT to Internet -->
  <line x1="99" y1="306" x2="99" y2="290" stroke="#166534" stroke-width="1" marker-end="url(#arrGreen2)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#495057"/>
    </marker>
    <marker id="arrBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrGreen" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0d6e3f"/>
    </marker>
    <marker id="arrGreen2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#166534"/>
    </marker>
    <marker id="arrPurple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6f42c1"/>
    </marker>
  </defs>
</svg>
